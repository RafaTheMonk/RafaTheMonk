<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440" role="img" aria-label="Animated terminal">
  <defs>
    <style type="text/css"><![CDATA[
      .mono { font-family: 'JetBrains Mono','Fira Code',ui-monospace,'Courier New',monospace; font-size: 18px; }
      .g   { fill: #00FF9C; }
      .cy  { fill: #26d0ce; }
      .w   { fill: #c9d1d9; }
      .dim { fill: #6e7681; }
      .y   { fill: #ffbd2e; }
      .ttl { fill: #8b949e; font-size: 14px; }
      .line { opacity: 0; animation: appear .35s ease forwards; }
      .l1 { animation-delay: .3s; }
      .l2 { animation-delay: .9s; }
      .l3 { animation-delay: 1.6s; }
      .l4 { animation-delay: 2.1s; }
      .l5 { animation-delay: 2.7s; }
      .l6 { animation-delay: 3.4s; }
      .l7 { animation-delay: 3.9s; }
      .l8 { animation-delay: 4.6s; }
      @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
      .cursor { fill: #00FF9C; opacity: 0; animation: appear .35s ease 4.6s forwards, blink 1.1s steps(1) infinite 4.6s; }
      @keyframes blink { 50% { opacity: 0; } }
    ]]></style>
  </defs>

  <rect x="8" y="8" width="704" height="424" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect x="8" y="8" width="704" height="40" rx="12" fill="#161b22"/>
  <rect x="8" y="30" width="704" height="18" fill="#161b22"/>
  <line x1="8" y1="48" x2="712" y2="48" stroke="#30363d" stroke-width="1"/>
  <circle cx="34" cy="28" r="7" fill="#ff5f56"/>
  <circle cx="58" cy="28" r="7" fill="#ffbd2e"/>
  <circle cx="82" cy="28" r="7" fill="#27c93f"/>
  <text x="360" y="33" text-anchor="middle" class="mono ttl">rafa@themonk: ~</text>

  <g class="mono">
    <text x="28" y="90"  class="line l1"><tspan class="g">$</tspan><tspan class="w"> whoami</tspan></text>
    <text x="28" y="120" class="line l2"><tspan class="cy">rafael brito :: full-stack // ai // infra</tspan></text>

    <text x="28" y="162" class="line l3"><tspan class="g">$</tspan><tspan class="w"> sudo make coffee</tspan></text>
    <text x="28" y="192" class="line l4"><tspan class="dim">[sudo] password for rafael: ********</tspan></text>
    <text x="28" y="222" class="line l5"><tspan class="w">brewing</tspan><tspan class="dim"> ... </tspan><tspan class="g">done.</tspan><tspan class="w"> productivity +100%</tspan></text>

    <text x="28" y="264" class="line l6"><tspan class="g">$</tspan><tspan class="w"> ./deploy --to prod --when friday</tspan></text>
    <text x="28" y="294" class="line l7"><tspan class="y">permission denied: nice try.</tspan></text>

    <text x="28" y="336" class="line l8"><tspan class="g">$</tspan></text>
    <rect class="cursor" x="46" y="321" width="11" height="20"/>
  </g>
</svg>
